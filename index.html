<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARCADE EMU</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #ff003c; --yellow: #ffe600; --cyan: #00f0ff;
      --dark: #0a0a0f; --panel: #10101a; --border: #1e1e2e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--dark); color: #fff;
      font-family: 'Share Tech Mono', monospace;
      display: flex; flex-direction: column; align-items: center; padding: 20px;
    }
    .arcade-cabinet {
      width: 100%; max-width: 800px;
      background: var(--panel); border: 2px solid var(--border);
      border-radius: 8px; padding: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    #game-container { width: 100%; aspect-ratio: 4/3; background: #000; }
    .btn-launch {
      margin-top: 20px; padding: 15px 30px;
      background: var(--red); color: white; border: none;
      font-family: 'Press Start 2P', cursive; cursor: pointer; font-size: 12px;
    }
    .btn-launch:disabled { background: #444; cursor: not-allowed; }
  </style>
</head>
<body>

  <header style="text-align: center; margin-bottom: 20px;">
    <h1 style="font-family: 'Press Start 2P'; color: var(--cyan);">ARCADE EMU</h1>
  </header>

  <div class="arcade-cabinet">
    <div id="game-container"></div>
  </div>

  <button class="btn-launch" id="btnLaunch" onclick="launchGame()">INICIAR JOGO</button>

<script>
  function launchGame() {
    // Desabilita o botão para evitar múltiplos cliques
    document.getElementById('btnLaunch').disabled = true;
    const container = document.getElementById('game-container');
    
    // HTML que será injetado no iframe
    const iframeHTML = `
<!DOCTYPE html>
<html>
<head>
  <style>body { margin:0; background:#000; overflow:hidden; width:100vw; height:100vh; }</style>
</head>
<body>
  <div id="game"></div>
  <script>
    window.EJS_player = '#game';
    window.EJS_core = 'geolith'; 
    window.EJS_gameUrl = 'roms/kof94.zip';
    window.EJS_biosUrl = 'roms/neogeo.zip';
    window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
    window.EJS_startOnLoaded = true;
    window.EJS_neogeoBios = true;
    window.EJS_volume = 0.5;

    window.EJS_buttons = {
      '0': {
        'v': [
          { 'k': 38 }, { 'k': 40 }, { 'k': 37 }, { 'k': 39 }, 
          { 'k': 65 }, { 'k': 83 }, { 'k': 90 }, { 'k': 88 }, 
          { 'k': 13 }, { 'k': 16 }
        ]
      }
    };
  <\/script>
  <script src="https://cdn.emulatorjs.org/stable/data/loader.js"><\/script>
</body>
</html>`;

    // Cria o iframe dinamicamente
    const iframe = document.createElement('iframe');
    iframe.style.width = '100%';
    iframe.style.height = '100%';
    iframe.style.border = 'none';
    iframe.srcdoc = iframeHTML;
    
    // Adiciona ao container
    container.appendChild(iframe);
  }
</script>
</body>
</html>
