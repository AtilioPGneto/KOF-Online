<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARCADE EMU</title>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    :root{
      --red:#ff003c;
      --yellow:#ffe600;
      --cyan:#00f0ff;
      --dark:#0a0a0f;
      --panel:#10101a;
      --border:#1e1e2e;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:var(--dark);
      color:#fff;
      font-family:'Share Tech Mono', monospace;

      display:flex;
      flex-direction:column;
      align-items:center;

      padding:20px;
      min-height:100vh;
    }

    header{
      text-align:center;
      margin-bottom:20px;
    }

    header h1{
      font-family:'Press Start 2P', cursive;
      color:var(--cyan);
      font-size:24px;
    }

    header p{
      color:var(--yellow);
      font-size:10px;
      margin-top:10px;
      letter-spacing:2px;
    }

    .arcade-cabinet{
      width:100%;
      max-width:800px;

      background:var(--panel);
      border:2px solid var(--border);
      border-radius:8px;

      padding:10px;

      box-shadow:0 0 30px rgba(0,0,0,.7);
    }

    #game-container{
      width:100%;
      aspect-ratio:4/3;

      background:#000;

      display:flex;
      align-items:center;
      justify-content:center;

      overflow:hidden;
    }

    #game-container iframe{
      width:100%;
      height:100%;
      border:none;
    }

    #placeholder{
      color:#333;
      font-family:'Press Start 2P', cursive;
      font-size:10px;
    }

    .btn-launch{
      margin-top:20px;
      padding:15px 30px;

      background:var(--red);
      color:#fff;

      border:none;

      font-family:'Press Start 2P', cursive;
      font-size:12px;

      cursor:pointer;

      box-shadow:0 4px 0 #8b0021;
      transition:all .1s;
    }

    .btn-launch:active{
      transform:translateY(4px);
      box-shadow:none;
    }

    .btn-launch:disabled{
      background:#444;
      cursor:not-allowed;
      box-shadow:none;
    }
  </style>
</head>

<body>

  <header>
    <h1>ARCADE EMU</h1>
    <p>NEO-GEO SYSTEM OPERATIONAL</p>
  </header>

  <div class="arcade-cabinet">
    <div id="game-container">
      <p id="placeholder">INSERT COIN</p>
    </div>
  </div>

  <button class="btn-launch" id="btnLaunch">
    INICIAR JOGO
  </button>

  <script>
    const btn = document.getElementById("btnLaunch");

    btn.addEventListener("click", launchGame);

    function launchGame() {

      btn.disabled = true;
      btn.innerText = "CARREGANDO...";

      const container = document.getElementById("game-container");

      container.innerHTML = "";

      const iframe = document.createElement("iframe");

      iframe.srcdoc = `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}

#game{
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div id="game"></div>

<script>
window.EJS_player = "#game";

window.EJS_core = "fbneo";

window.EJS_gameUrl = "roms/kof95.zip";

/* BIOS NeoGeo */
window.EJS_gameParentUrl = "roms/neogeo.zip";

/* Arquivos do EmulatorJS */
window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

/* Iniciar automático */
window.EJS_startOnLoaded = true;

/* Volume */
window.EJS_volume = 0.6;

<\/script>

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"><\/script>

</body>
</html>
      `;

      container.appendChild(iframe);
    }
  </script>

</body>
</html>
